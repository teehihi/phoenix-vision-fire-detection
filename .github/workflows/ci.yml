name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
      - tee
      - 'tee/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    if: github.event_name != 'pull_request' || (github.head_ref != 'tee' && !startsWith(github.head_ref, 'tee/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  ai-service-tests:
    name: AI service tests
    if: github.event_name != 'pull_request' || (github.head_ref != 'tee' && !startsWith(github.head_ref, 'tee/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  desktop-app-check:
    name: Desktop app tests
    if: github.event_name != 'pull_request' || (github.head_ref != 'tee' && !startsWith(github.head_ref, 'tee/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            desktop-app/requirements.txt
            ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile source
        run: python -m compileall -q run.py phoenixvision_desktop

      - name: Run desktop UI tests
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: .:../ai-service
        run: pytest -q tests
