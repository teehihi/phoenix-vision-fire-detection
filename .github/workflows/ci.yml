name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
      - tee
      - 'tee/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    if: github.event_name != 'pull_request' || (github.head_ref != 'tee' && !startsWith(github.head_ref, 'tee/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  ai-service-tests:
    name: AI service tests
    if: github.event_name != 'pull_request' || (github.head_ref != 'tee' && !startsWith(github.head_ref, 'tee/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  frontend-build:
    name: React frontend build
    if: github.event_name != 'pull_request' || (github.head_ref != 'tee' && !startsWith(github.head_ref, 'tee/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000000000
          VITE_FIREBASE_MEASUREMENT_ID: G-0000000000
        run: npm run build
