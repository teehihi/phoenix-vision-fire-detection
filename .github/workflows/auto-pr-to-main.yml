name: Auto PR to main

on:
  push:
    branches-ignore:
      - main
      - tee
      - 'tee/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr:
    name: Open PR and check merge conflicts
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.pr.outputs.pr-number }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard protected archive branches
        run: |
          case "${GITHUB_REF_NAME}" in
            tee|tee/*)
              echo "Branch '${GITHUB_REF_NAME}' is archived and must not be merged into main."
              exit 1
              ;;
          esac

      - name: Create or update pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace('refs/heads/', '');
            const base = 'main';

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${head}`,
              base,
              state: 'open',
              per_page: 1,
            });

            if (existing.length > 0) {
              core.info(`PR already exists: #${existing[0].number}`);
              core.setOutput('pr-number', existing[0].number);
              return;
            }

            const { data: pull } = await github.rest.pulls.create({
              owner,
              repo,
              title: `Auto PR: ${head} -> ${base}`,
              head,
              base,
              body: [
                'Automated PR opened after a push to this branch.',
                '',
                'CI must pass before merge.',
                'The archived `tee` branch is intentionally excluded from this workflow.',
              ].join('\n'),
              maintainer_can_modify: true,
            });

            core.info(`Created PR #${pull.number}: ${pull.html_url}`);
            core.setOutput('pr-number', pull.number);

      - name: Check whether branch can merge into main
        run: |
          git fetch origin main
          git checkout -B merge-check origin/main
          if ! git merge --no-commit --no-ff "${GITHUB_SHA}"; then
            git merge --abort || true
            echo "This branch conflicts with main. Resolve the conflict manually in the PR branch, then push again."
            exit 1
          fi
          git merge --abort || true

  backend-tests:
    name: Backend tests
    needs: open-pr
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  ai-service-tests:
    name: AI service tests
    needs: open-pr
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  desktop-app-check:
    name: Desktop app tests
    needs: open-pr
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            desktop-app/requirements.txt
            ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile source
        run: python -m compileall -q run.py phoenixvision_desktop

      - name: Run desktop UI tests
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: .:../ai-service
        run: pytest -q tests

  auto-merge:
    name: Auto merge into main
    needs:
      - open-pr
      - backend-tests
      - ai-service-tests
      - desktop-app-check
    runs-on: ubuntu-latest

    steps:
      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number('${{ needs.open-pr.outputs.pr-number }}');

            if (!pull_number) {
              throw new Error('No pull request number was produced.');
            }

            for (let attempt = 1; attempt <= 10; attempt += 1) {
              const { data: pull } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              });

              if (pull.head.ref === 'tee' || pull.head.ref.startsWith('tee/')) {
                throw new Error('Refusing to merge archived tee branch.');
              }

              if (pull.mergeable === true) {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number,
                  merge_method: 'squash',
                  commit_title: `Auto merge PR #${pull_number}: ${pull.title}`,
                });
                core.info(`Merged PR #${pull_number} into main.`);
                return;
              }

              if (pull.mergeable === false) {
                throw new Error('Pull request is not mergeable. Resolve conflicts manually, then push again.');
              }

              core.info(`Mergeability is pending; retrying (${attempt}/10).`);
              await new Promise((resolve) => setTimeout(resolve, 3000));
            }

            throw new Error('Timed out while waiting for GitHub to calculate mergeability.');
